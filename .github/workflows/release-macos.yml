name: Release macOS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub release tag to upload macOS assets to
        required: true
        default: v0.24.7

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - run: npm ci

      - name: Build universal macOS DMG
        run: npm run tauri -- build --target universal-apple-darwin --bundles dmg

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          mkdir -p release-artifacts
          dmg="$(find target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' -type f | head -n 1)"
          cp "$dmg" "release-artifacts/codex-clone-launcher_${version}_macos_universal.dmg"
          (
            cd release-artifacts
            shasum -a 256 "codex-clone-launcher_${version}_macos_universal.dmg" > SHA256SUMS-macos.txt
          )

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
