name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - run: npm ci

      - name: Validate tag matches package version
        run: node scripts/validate-release-version.cjs --tag "${{ github.ref_name }}" --owner-repo "${{ github.repository }}" --require-newer-than-latest

      - name: Validate release workflow hardening
        run: npm run verify:release-workflow

      - name: Build frontend before signing
        run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_RELEASE: codex-clone-launcher@${{ github.ref_name }}

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATER_OWNER_REPO: ${{ github.repository }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CODEX_SKIP_TAURI_BEFORE_BUILD: "1"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Codex Clone Launcher ${{ github.ref_name }}"
          releaseBody: "Windows installer and Tauri updater metadata."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Verify draft updater release assets
        run: node scripts/verify-updater-release.cjs --owner-repo "${{ github.repository }}" --tag "${{ github.ref_name }}" --allow-draft --skip-latest-endpoint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish verified release
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published latest updater endpoint
        run: node scripts/verify-updater-release.cjs --owner-repo "${{ github.repository }}" --tag "${{ github.ref_name }}" --latest-url "https://github.com/${{ github.repository }}/releases/latest/download/latest.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
